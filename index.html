<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MTV CRT TV v10 Fullscreen</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Press+Start+2P&display=swap');

body{
  margin:0;
  background:#000;
  font-family:'Press Start 2P', cursive;
  color:#0ff;
  overflow-y:auto;
}

/* UI */
.container{
  text-align:center;
  margin-top:10px;
}

input{
  padding:10px;
  width:60%;
  background:#000;
  border:2px solid #0ff;
  color:#0ff;
}

button{
  padding:10px;
  margin:4px;
  background:#ff00ff;
  border:none;
  cursor:pointer;
}

/* TV */
.tv-shell{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

.tv-bezel{
  background:linear-gradient(145deg,#2a2a2a,#0b0b0b);
  padding:22px;
  border-radius:30px;
  box-shadow:0 40px 120px rgba(0,0,0,0.9);
}

.screen{
  width:900px;
  aspect-ratio:16/9;
  position:relative;
  overflow:hidden;
  border-radius:18px;
  background:#000;
  transform: perspective(900px) rotateX(2deg);
  box-shadow:
    inset 0 0 90px rgba(0,0,0,0.95),
    0 0 30px rgba(0,255,255,0.1);
}

#yt{
  width:100%;
  height:100%;
  filter: contrast(1.25) saturate(1.35) brightness(0.9);
  transform:scale(1.03);
}

/* CRT */
.scanlines,.vignette,.noise,.glow{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.scanlines{
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.35),rgba(0,0,0,0.35) 1px,transparent 2px,transparent 4px);
  mix-blend-mode:multiply;
}

.vignette{
  background:radial-gradient(circle,transparent 45%,rgba(0,0,0,0.75) 100%);
}

.noise{
  background:url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
  opacity:0.05;
}

.glow{
  background:rgba(0,255,255,0.03);
}

/* FULLSCREEN FIX */
:fullscreen .screen{
  width:100vw;
  height:100vh;
  border-radius:0;
  transform:none;
}

:fullscreen #yt{
  transform:scale(1.05);
}

/* LIST */
.panel{
  max-width:900px;
  margin:20px auto;
  border:1px solid #0ff;
  padding:10px;
  max-height:200px;
  overflow-y:auto;
}

.track{
  padding:5px;
  border-bottom:1px solid #222;
}
.track:hover{background:#111;}
</style>
</head>

<body>

<div class="container">
  <input id="input" placeholder="YouTube / Playlist / Spotify link"/>

  <button onclick="addMedia()">Add</button>
  <button onclick="saveDVR()">💾 Save</button>
  <button onclick="loadDVR()">📂 Load</button>
  <button onclick="toggleChannel()">Channel</button>
  <button onclick="goFullscreen()">⛶ Fullscreen</button>
</div>

<div class="tv-shell">
  <div class="tv-bezel">
    <div class="screen">
      <div id="yt"></div>

      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="noise"></div>
      <div class="glow"></div>
    </div>
  </div>
</div>

<div class="panel" id="list"></div>

<script>
let player;

// ================= SPOTIFY CONFIG =================
const SPOTIFY_CLIENT_ID = "YOUR_CLIENT_ID";
const SPOTIFY_CLIENT_SECRET = "YOUR_CLIENT_SECRET";
let spotifyToken = null;

// ================= STATE =================
const Broadcast = {
  channels:{1:[],2:[],3:[]},
  active:1,
  index:-1,
  busy:false,
  started:false
};

// ================= YOUTUBE =================
const tag=document.createElement("script");
tag.src="https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function onYouTubeIframeAPIReady(){
  player=new YT.Player("yt",{events:{onStateChange:onState}});
}

// ================= HELPERS =================
function yt(url){
  const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}

function pl(url){
  const m=url.match(/[?&]list=([a-zA-Z0-9_-]+)/);
  return m?m[1]:null;
}

function sp(url){
  const m=url.match(/playlist\/([a-zA-Z0-9]+)/);
  return m?m[1]:null;
}

// ================= SPOTIFY =================
async function getSpotifyToken(){
  const res=await fetch("https://accounts.spotify.com/api/token",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded",
      "Authorization":"Basic "+btoa(SPOTIFY_CLIENT_ID+":"+SPOTIFY_CLIENT_SECRET)
    },
    body:"grant_type=client_credentials"
  });

  const data=await res.json();
  spotifyToken=data.access_token;
}

async function getSpotifyTracks(id){
  if(!spotifyToken) await getSpotifyToken();

  const res=await fetch(
    `https://api.spotify.com/v1/playlists/${id}/tracks`,
    {headers:{Authorization:"Bearer "+spotifyToken}}
  );

  const data=await res.json();

  return data.items.map(t=>
    t.track.name+" "+t.track.artists[0].name
  );
}

// ================= YT SEARCH =================
function playSearch(q){
  fetch("https://www.youtube.com/results?search_query="+encodeURIComponent(q))
  .then(r=>r.text())
  .then(html=>{
    const match = html.match(/watch\?v=([a-zA-Z0-9_-]{11})/);
    if(match) player.loadVideoById(match[1]);
  });
}

// ================= ADD MEDIA =================
async function addMedia(){

  const v=document.getElementById("input").value;

  const ytid=yt(v);
  const plid=pl(v);
  const spid=sp(v);

  if(ytid){
    Broadcast.channels[Broadcast.active].push({type:"yt",id:ytid});
  }

  else if(plid){
    Broadcast.channels[Broadcast.active].push({type:"playlist",id:plid});
  }

  else if(spid){
    const tracks=await getSpotifyTracks(spid);

    tracks.forEach(t=>{
      Broadcast.channels[Broadcast.active].push({
        type:"search",
        q:t
      });
    });
  }

  else return alert("Invalid link");

  render();

  if(!Broadcast.started){
    Broadcast.started=true;
    next();
  }
}

// ================= PLAY =================
function play(item){

  if(item.type==="yt"){
    player.loadVideoById(item.id);
  }

  else if(item.type==="playlist"){
    player.loadPlaylist({
      list:item.id,
      listType:"playlist",
      index:0,
      autoplay:1
    });
  }

  else if(item.type==="search"){
    playSearch(item.q);
  }
}

// ================= ENGINE =================
function next(){
  if(Broadcast.busy) return;

  const list = Broadcast.channels[Broadcast.active];
  if(!list.length) return;

  Broadcast.index++;
  const item = list[Broadcast.index % list.length];

  play(item);
}

// ================= AUTO =================
function onState(e){
  if(e.data===YT.PlayerState.ENDED){
    next();
  }
}

// ================= FULLSCREEN =================
function goFullscreen(){
  const screen = document.querySelector(".screen");
  const noise = document.querySelector(".noise");

  // quick CRT flash
  noise.style.opacity = 0.4;
  setTimeout(()=> noise.style.opacity = 0.05, 150);

  if (!document.fullscreenElement){
    screen.requestFullscreen().catch(err=>{
      alert("Fullscreen failed: "+err.message);
    });
  } else {
    document.exitFullscreen();
  }
}

// keyboard shortcut
document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase() === "f"){
    goFullscreen();
  }
});

// ================= SAVE LOAD =================
function saveDVR(){
  localStorage.setItem("mtv",JSON.stringify(Broadcast));
  alert("Saved");
}

function loadDVR(){
  const d=JSON.parse(localStorage.getItem("mtv"));
  if(!d)return;

  Object.assign(Broadcast,d);
  render();
  next();
}

// ================= CHANNEL =================
function toggleChannel(){
  Broadcast.active++;
  if(Broadcast.active>3) Broadcast.active=1;

  Broadcast.index=-1;
  next();
  render();
}

// ================= UI =================
function render(){
  const l=Broadcast.channels[Broadcast.active];
  document.getElementById("list").innerHTML=
    `<b>CHANNEL ${Broadcast.active}</b><br>`+
    l.map((v,i)=>`<div class="track">${v.type}</div>`).join("");
}
</script>

</body>
</html>
